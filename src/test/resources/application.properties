spring.datasource.url=jdbc:h2:mem:literalura;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.open-in-view=false

# Flyway se prueba contra PostgreSQL; en tests el esquema lo crea Hibernate sobre H2.
spring.flyway.enabled=false

# --- Seguridad (solo para tests) ---
jwt.secret=test-secret-key-for-integration-tests-0123456789abcdef
jwt.expiration-seconds=3600
app.admin.username=admin
app.admin.password=admin12345
app.cors.allowed-origins=http://localhost:5173
