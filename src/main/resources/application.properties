spring.application.name=literalura

# --- Servidor ---
server.port=${PORT:8080}

# --- Base de datos (PostgreSQL) ---
# Valores por defecto para desarrollo local; se sobrescriben con variables de entorno en producción.
spring.datasource.url=${DB_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:literalura}}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate ---
# Flyway gestiona el esquema; Hibernate solo valida que las entidades coincidan.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# --- Flyway (migraciones de esquema) ---
spring.flyway.enabled=true

# --- OpenAPI / Swagger UI ---
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# --- Actuator ---
management.endpoints.web.exposure.include=health,info

# --- Seguridad (JWT) ---
# El secreto por defecto es SOLO para desarrollo; en producción definir JWT_SECRET (>= 32 caracteres).
jwt.secret=${JWT_SECRET:literalura-dev-secret-change-me-in-production-0123456789}
jwt.expiration-seconds=${JWT_EXPIRATION_SECONDS:3600}

# --- Admin inicial (se crea solo si no existen usuarios) ---
app.admin.username=${ADMIN_USERNAME:admin}
app.admin.password=${ADMIN_PASSWORD:admin12345}
