# Blueprint de despliegue para Render (https://render.com)
# Crea una base de datos PostgreSQL y un servicio web a partir del Dockerfile.
services:
  - type: web
    name: literalura-api
    runtime: docker
    plan: free
    healthCheckPath: /actuator/health
    envVars:
      - key: DB_HOST
        fromDatabase:
          name: literalura-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: literalura-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: literalura-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: literalura-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: literalura-db
          property: password
      # Render genera un secreto seguro (>= 32 caracteres) para firmar los JWT.
      - key: JWT_SECRET
        generateValue: true
      # Credenciales del ADMIN inicial: se definen en el dashboard al desplegar.
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
      # Origen del frontend (dominio de Vercel); se completa tras desplegar el SPA.
      - key: CORS_ALLOWED_ORIGINS
        sync: false

databases:
  - name: literalura-db
    plan: free
    databaseName: literalura
